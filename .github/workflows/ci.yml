name: iOS CI - XcodeGen

on:
  push:
    branches: [ develop, main ]
  pull_request:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.0'

      - name: Install Homebrew packages (XcodeGen)
        run: |
          brew update
          brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      - name: Get iPhone 15 Pro simulator (flexible OS)
        id: simulator
        run: |
          SIM=$(xcrun simctl list devices available | grep -E "iPhone 15 Pro" | awk -F '[()]' '{print $2}' | head -n 1)
          echo "SIMULATOR_UDID=$SIM" >> $GITHUB_ENV
          echo "DESTINATION=platform=iOS Simulator,name=iPhone 15 Pro,id=$SIM" >> $GITHUB_ENV
          echo "Using simulator UDID: $SIM"

      - name: Build app for simulator
        run: |
          xcodebuild \
            -scheme "CartoniaApp" \
            -sdk iphonesimulator \
            -destination "$DESTINATION" \
            clean build

  test:
    runs-on: macos-latest
    needs: build

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.0'

      - name: Install Homebrew packages (XcodeGen)
        run: |
          brew update
          brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      - name: Get iPhone 15 Pro simulator (flexible OS)
        id: simulator
        run: |
          SIM=$(xcrun simctl list devices available | grep -E "iPhone 15 Pro" | awk -F '[()]' '{print $2}' | head -n 1)
          echo "SIMULATOR_UDID=$SIM" >> $GITHUB_ENV
          echo "DESTINATION=platform=iOS Simulator,name=iPhone 15 Pro,id=$SIM" >> $GITHUB_ENV
          echo "Using simulator UDID: $SIM"

      - name: Run unit tests on simulator
        run: |
          xcodebuild test \
            -scheme "CartoniaApp" \
            -sdk iphonesimulator \
            -destination "$DESTINATION" \
            -enableCodeCoverage YES
