name: iOS CI - XcodeGen

on:
  push:
    branches: [ develop, main ]
  pull_request:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.0'

      - name: Install Homebrew packages (XcodeGen)
        run: |
          brew update
          brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      - name: Debug available destinations
        run: xcodebuild -scheme CartoniaApp -showdestinations

      - name: Build app for simulator
        run: |
          xcodebuild \
            -scheme "CartoniaApp" \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,name=Any iOS Simulator Device" \
            clean build

  test:
    runs-on: macos-latest
    needs: build
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.0'

      - name: Install Homebrew packages (XcodeGen)
        run: |
          brew update
          brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      - name: Run unit tests on simulator
        run: |
          xcodebuild test \
            -scheme "CartoniaApp" \
            -sdk iphonesimulator \
