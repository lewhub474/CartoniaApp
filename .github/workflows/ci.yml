name: iOS CI - XcodeGen

on:
  push:
    branches: [ develop, main ]
  pull_request:

jobs:
  setup-sim:
    runs-on: macos-latest
    outputs:
      destination: ${{ steps.sim.outputs.destination }}
    steps:
      - name: Set Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.0'

      - name: Get iPhone 15 Pro simulator
        id: sim
        run: |
          SIM=$(xcrun simctl list devices available | grep "iPhone 15 Pro" | sed -E 's/.*\[([0-9A-F-]+)\].*/\1/' | head -n 1)
          if [ -z "$SIM" ]; then
            echo "❌ No se encontró un simulador iPhone 15 Pro disponible."
            exit 1
          fi
          echo "destination=platform=iOS Simulator,id=$SIM" >> $GITHUB_OUTPUT
          echo "✅ Using simulator UDID: $SIM"

  build:
    runs-on: macos-latest
    needs: setup-sim

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.0'

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      - name: Debug available destinations
        run: xcodebuild -scheme CartoniaApp -showdestinations

      - name: Build app for simulator
        run: |
          xcodebuild \
            -scheme "CartoniaApp" \
            -sdk iphonesimulator \
            -destination "${{ needs.setup-sim.outputs.destination }}" \
            clean build

  test:
    runs-on: macos-latest
    needs: [setup-sim, build]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.0'

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      - name: Run unit tests on simulator
        run: |
          xcodebuild test \
            -scheme "CartoniaApp" \
            -sdk iphonesimulator \
            -destination "${{ needs.setup-sim.outputs.destination }}" \
            -enableCodeCoverage YES
