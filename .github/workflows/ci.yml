name: iOS CI - XcodeGen

on:
  push:
    branches: [ develop, main ]
  pull_request:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.0'

      - name: Install Homebrew packages (XcodeGen)
        run: |
          brew update
          brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      # 🔹 Variante híbrida: detecta el primer simulador válido o usa fallback fijo
      - name: Get available simulator (hybrid)
        id: simulator
        run: |
          SIM=$(xcrun simctl list devices available | grep -E "iPhone 15 Pro" | grep "18.5" | awk -F '[()]' '{print $2}' | head -n 1)
          if [ -z "$SIM" ]; then
            echo "⚠️ No se encontró iPhone 15 Pro (iOS 18.5), usando fallback fijo."
            DEST="platform=iOS Simulator,name=iPhone 15 Pro,OS=18.5"
          else
            echo "✅ Usando simulador detectado: $SIM"
            DEST="id=$SIM"
          fi
          echo "DESTINATION=$DEST" >> $GITHUB_ENV

      - name: Build app for simulator
        run: |
          xcodebuild \
            -scheme "CartoniaApp" \
            -sdk iphonesimulator \
            -destination "${{ env.DESTINATION }}" \
            clean build

  test:
    runs-on: macos-latest
    needs: build

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.0'

      - name: Install Homebrew packages (XcodeGen)
        run: |
          brew update
          brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      - name: Get available simulator (hybrid)
        id: simulator
        run: |
          SIM=$(xcrun simctl list devices available | grep -E "iPhone 15 Pro" | grep "18.5" | awk -F '[()]' '{print $2}' | head -n 1)
          if [ -z "$SIM" ]; then
            echo "⚠️ No se encontró iPhone 15 Pro (iOS 18.5), usando fallback fijo."
            DEST="platform=iOS Simulator,name=iPhone 15 Pro,OS=18.5"
          else
            echo "✅ Usando simulador detectado: $SIM"
            DEST="id=$SIM"
          fi
          echo "DESTINATION=$DEST" >> $GITHUB_ENV

      - name: Run unit tests on simulator
        run: |
          xcodebuild test \
            -scheme "CartoniaApp" \
            -sdk iphonesimulator \
            -destination "${{ env.DESTINATION }}" \
            -enableCodeCoverage YES
