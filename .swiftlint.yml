# SwiftLint Configuration for CartoniaApp
# This configuration is designed to improve code quality and developer skills

# Paths to include/exclude
included:
  - CartoniaApp
  - CartoniaAppTests
  - CartoniaAppUITests

excluded:
  - Pods
  - Carthage
  - .build
  - DerivedData
  - .git

# Rules to enable/disable
disabled_rules:
  - todo # Allow TODO comments for development

# Rules to enable (comprehensive set for learning)
opt_in_rules:
  # Code Style & Formatting
  - array_init
  - attributes
  - closure_body_length
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - discouraged_object_literal
  - empty_collection_literal
  - empty_count
  - empty_string
  - enum_case_associated_values_count
  - extension_access_modifier
  - fallthrough
  - fatal_error_message
  - file_header
  - first_where
  - force_unwrapping
  - function_default_parameter_at_end
  - identical_operands
  - implicit_return
  - joined_default_parameter
  - last_where
  - legacy_random
  - literal_expression_end_indentation
  - lower_acl_than_parent
  - modifier_order
  - multiline_arguments
  - multiline_parameters
  - nimble_operator
  - nslocalizedstring_key
  - number_separator
  - object_literal
  - operator_usage_whitespace
  - overridden_super_call
  - override_in_extension
  - pattern_matching_keywords
  - prefer_self_type_over_type_of_self
  - prefer_zero_over_explicit_init
  - prefixed_toplevel_constant
  - prohibited_interface_builder
  - prohibited_super_call
  - quick_discouraged_call
  - quick_discouraged_focused_test
  - quick_discouraged_pending_test
  - redundant_nil_coalescing
  - redundant_type_annotation
  - required_enum_case
  - return_arrow_whitespace
  - single_test_class
  - sorted_first_last
  - sorted_imports
  - static_operator
  - strong_iboutlet
  - switch_case_on_newline
  - toggle_bool
  - trailing_closure
  - unneeded_parentheses_in_closure_argument
  - untyped_error_in_catch
  - vertical_parameter_alignment_on_call
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces
  - xct_specific_matcher
  - yoda_condition
  - missing_docs
  - implicitly_unwrapped_optional

# Custom rule configurations
line_length:
  warning: 120
  error: 150
  ignores_urls: true
  ignores_function_declarations: true
  ignores_comments: true

function_body_length:
  warning: 50
  error: 100

function_parameter_count:
  warning: 5
  error: 8

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 400
  error: 1000

cyclomatic_complexity:
  warning: 10
  error: 20

nesting:
  type_level:
    warning: 3
    error: 6

identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 40
    error: 60
  excluded:
    - id
    - url
    - api
    - ui
    - id
    - ok
    - no
    - yes

type_name:
  min_length:
    warning: 3
    error: 2
  max_length:
    warning: 40
    error: 60

# Force unwrapping configuration
force_unwrapping:
  severity: warning

# Force casting configuration
force_cast:
  severity: warning

# Implicitly unwrapped optionals
implicitly_unwrapped_optional:
  severity: warning

# Trailing whitespace
trailing_whitespace:
  ignores_empty_lines: true
  ignores_comments: true

# Large tuple
large_tuple:
  warning: 3
  error: 4

# Missing docs
missing_docs:
  severity: warning
  excludes:
    - CartoniaAppTests
    - CartoniaAppUITests

# Custom rules for educational purposes
custom_rules:
  # Disabled explicit_type_annotation rule (conflicts with redundant_type_annotation)
  # explicit_type_annotation:
  #   name: "Explicit Type Annotation"
  #   regex: 'let\s+\w+\s*=\s*[^:]+$'
  #   message: "Consider adding explicit type annotation for better code clarity"
  #   severity: warning
  #   match_kinds:
  #     - comment
  #     - doccomment
  #     - identifier
  #     - keyword
  #     - number
  #     - objectliteral
  #     - parameter
  #     - placeholder
  #     - string
  #     - typeidentifier

  # Removed invalid no_force_unwrapping_in_production rule

  # Encourage guard statements over if-let for early returns
  prefer_guard_over_if_let:
    name: "Prefer Guard Over If-Let"
    regex: 'if\s+let\s+\w+\s*=\s*\w+\s*\{'
    message: "Consider using guard-let for early returns to reduce nesting"
    severity: warning
    match_kinds:
      - keyword
      - identifier

# Reporter configuration
reporter: "xcode"